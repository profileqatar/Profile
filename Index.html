<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-5">

<h2 class="mb-4">Contact Us</h2>

<form action="send-mail.php" method="POST" class="w-100">
  <div class="mb-3">
    <label for="name" class="form-label">Full Name</label>
    <input type="text" class="form-control" id="name" name="name" placeholder="Your full name" required>
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">Email Address</label>
    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
  </div>

  <div class="mb-3">
    <label for="subject" class="form-label">Subject</label>
    <input type="text" class="form-control" id="subject" name="subject" placeholder="Subject of your message">
  </div>

  <div class="mb-4">
    <label for="message" class="form-label">Your Message</label>
    <textarea class="form-control" id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
  </div>

  <!-- Honeypot field (hidden) -->
  <div style="display:none;">
    <input type="text" name="phone" value="">
  </div>

  <!-- Captcha -->
  <div class="mb-3">
    <label for="captcha" class="form-label" id="captcha-question">Loading captcha…</label>
    <input type="text" class="form-control" id="captcha" name="captcha" placeholder="Your answer" required>
    <input type="hidden" id="captcha1" name="captcha1">
    <input type="hidden" id="captcha2" name="captcha2">
  </div>

  <button type="submit" class="btn btn-primary w-100 py-2 fs-5">Send Message</button>
</form>

<div id="form-message" class="mt-3"></div>

<script>
  // Generate simple addition captcha on page load
  const n1 = Math.floor(Math.random() * 10) + 1;
  const n2 = Math.floor(Math.random() * 10) + 1;
  document.getElementById("captcha-question").textContent = "What is " + n1 + " + " + n2 + " ?";
  document.getElementById("captcha1").value = n1;
  document.getElementById("captcha2").value = n2;

  // Show messages from URL
  const urlParams = new URLSearchParams(window.location.search);
  const status = urlParams.get("status");
  const msgDiv = document.getElementById("form-message");
  if (status === "success") {
    msgDiv.style.color = "green";
    msgDiv.textContent = "Thank you! Your message has been sent successfully.";
  } else if (status === "error") {
    msgDiv.style.color = "red";
    msgDiv.textContent = "Oops! Something went wrong. Please try again later.";
  } else if (status === "captcha") {
    msgDiv.style.color = "red";
    msgDiv.textContent = "Captcha verification failed.";
  } else if (status === "spam") {
    msgDiv.style.color = "red";
    msgDiv.textContent = "Spam detected. Please try again.";
  }
</script>

</body>
</html>
